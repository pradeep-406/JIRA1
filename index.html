<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page - GitHub & Jira</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border-color:#4facfe;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .btn:hover{
            background:#2196f3;
        }

        .links{
            display:flex;
            justify-content:space-between;
            margin-top:20px;
        }

        .github-btn{
            background:#24292e;
        }

        .jira-btn{
            background:#0052cc;
        }

        .message{
            text-align:center;
            margin-top:15px;
            color:green;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login Page</h2>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <button class="btn" onclick="login()">Login</button>

        <div class="secondary-link" style="text-align:center; margin-top:15px; font-size:14px;">
            Don't have an account? <a href="signup.html" style="color:#4facfe; text-decoration:none; font-weight:bold;">Sign Up</a>
        </div>

        <div class="links">
            <button class="btn github-btn" onclick="openGithub()">
                GitHub
            </button>

            <button class="btn jira-btn" onclick="openJira()">
                Jira
            </button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            if(username === "" || password === ""){
                alert("Please enter username and password");
            } 
            else {
                localStorage.setItem("username", username);

                document.getElementById("message").innerHTML =
                    "Login Successful!";

                setTimeout(() => {
                    window.location.href =
                    "https://github.com";
                }, 1500);
            }
        }

        function openGithub() {
            window.open("https://github.com", "_blank");
        }

        function openJira() {
            window.open("https://www.atlassian.com/software/jira", "_blank");
        }
    </script>

</body>
</html>
